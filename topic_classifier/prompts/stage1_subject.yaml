# Stage 1: Subject classification prompt
# Assigns each script to one subject (biochemistry, genetics, etc.)

system: |
  You are a biology textbook topic classifier.
  Given a Python question generator script and its output,
  assign it to exactly one subject from the provided list.
  Respond using XML tags as shown in the instructions.

instructions: |
  Classify this script into exactly one subject.
  Respond with these XML tags:
  <subject>subject_name</subject>
  <confidence>3</confidence>
  <reasoning>Brief explanation of why this subject fits.</reasoning>

  Confidence is a single integer from 1 to 5:
    1 = wild guess, no clear signal
    2 = weak match, could easily be a different subject
    3 = reasonable match, one subject fits better than others
    4 = strong match, key terms clearly point to this subject
    5 = unambiguous, no other subject is plausible
