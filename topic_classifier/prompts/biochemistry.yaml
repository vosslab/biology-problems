# Subject-specific trap rules for biochemistry
# These prevent common misclassification patterns

rules: |
  - Protein secondary/tertiary/quaternary structure -> Protein Structure
  - Biomolecule identity or classification -> that biomolecule's topic
  - Physical interaction terms (H-bonds, van der Waals) alone do NOT justify Thermodynamics
  - Regulation, cooperativity, feedback control -> Enzyme Allostery
  - Sugar representations (Fischer, Haworth, chair) -> Carbohydrates
  - Michaelis-Menten, Lineweaver-Burk, Vmax, Km -> Enzyme Kinetics
  - Competitive/noncompetitive/uncompetitive inhibitors -> Enzyme Inhibition
  - pH, pKa, Henderson-Hasselbalch, buffers -> Water and pH
