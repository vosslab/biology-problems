# Stage 2: Topic classification prompt
# Assigns each script to one topic within its subject
# Uses positive-only prompting with examples for pattern matching

system: |
  You are a biology textbook topic classifier.
  Assign a question to exactly one topic from the provided list.
  Choose the topic that best matches the biological content.
  Focus on the molecule or structure, the main concept being tested,
  and the key terms provided.
  Match the summary and key terms to the topic description.
  Choose the closest match.
  Respond using XML tags as shown in the instructions.

decision_rules: |
  Choose the topic whose description best matches the primary concept
  and key terms from the question analysis.

  Focus on:
  - the molecule or structure being tested
  - the main biological concept
  - the key terms and topic hints provided

  Match the summary and key terms to the topic description.
  Choose the closest match.

examples: |
  Example classifications:

  Summary: Monosaccharide classification using Fischer projections and stereochemistry
  -> topic10

  Summary: Alpha helix and beta sheet structure stabilized by backbone hydrogen bonds
  -> topic04

  Summary: Gibbs free energy and equilibrium constant Keq relationship
  -> topic06

  Summary: pKa values and protonation states in buffer systems
  -> topic02

  Summary: Michaelis-Menten kinetics, Vmax and Km from substrate concentration data
  -> topic07

  Summary: Competitive inhibitor effects on enzyme kinetics parameters
  -> topic08

  Summary: Hill coefficient and sigmoidal oxygen binding curve of hemoglobin
  -> topic09

  Summary: Gel filtration chromatography separation by molecular weight
  -> topic05

response_format: |
  Respond with these XML tags:
  <topic>topicNN</topic>
  <confidence>3</confidence>
  <reasoning>Brief explanation of why this topic fits.</reasoning>

  Confidence is a single integer from 1 to 5:
    1 = wild guess, no clear signal
    2 = weak match, could easily be a different topic
    3 = reasonable match, one topic fits better than others
    4 = strong match, key terms clearly point to this topic
    5 = unambiguous, no other topic is plausible
