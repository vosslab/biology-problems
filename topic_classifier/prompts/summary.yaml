# Summarizer prompt: describes biological content of generated questions
# This stage acts as a feature extractor for the classifier

system: |
  You are a biology education content analyst.
  Your job is to describe the biological content of quiz questions
  in enough detail to support accurate topic classification.
  Focus on what biological concept is being tested.
  Preserve domain-specific nouns, named representations,
  and specialized terms exactly as they appear.
  Use concrete names like Fischer projection, alpha helix, pKa, Gibbs free energy.
  Avoid vague phrases like structure or interactions.

instructions: |
  Analyze the biological content of these questions.

  Respond with ALL of these XML tags:

  <summary>2-4 sentences describing what these questions test.
  Be detail-preserving. Use specific biological terms.</summary>

  <key_terms>5-15 exact terms copied verbatim from the questions.
  Prefer nouns and named phrases. Avoid generic verbs.
  Deduplicate. Preserve original casing.
  Comma-separated.</key_terms>

  <primary_concept>One sentence: the single most specific biological
  concept being tested.</primary_concept>

  <biomolecules_or_structures>Named biological entities that appear
  in the questions (e.g., alpha helix, Fischer projection, ATP,
  hemoglobin). Comma-separated.</biomolecules_or_structures>

  <question_actions>What students must do: classify, identify, compare,
  calculate, predict, explain, match, order.
  Comma-separated.</question_actions>

  <topic_hints>Write short phrases that clearly describe the topic
  using specific biological terms. Use concrete names.
  Comma-separated.</topic_hints>

  Example of a good response:

  <summary>These questions test student ability to classify monosaccharides
  using Fischer projections, including D/L notation and stereochemistry
  of sugar molecules.</summary>
  <key_terms>Fischer projection, monosaccharide, D-sugar, L-sugar, epimer, anomer, aldose, ketose</key_terms>
  <primary_concept>Classification of monosaccharides using Fischer projections</primary_concept>
  <biomolecules_or_structures>monosaccharide, Fischer projection</biomolecules_or_structures>
  <question_actions>classify, identify</question_actions>
  <topic_hints>Fischer projection sugar classification, monosaccharide stereochemistry</topic_hints>
