# Regression test set for topic classifier
# Handpicked confusable examples with expected topics and nearby wrong topics
# Run after every prompt change to catch regressions

# Biochemistry -- Protein Structure vs Thermodynamics vs Water/pH
- script: problems/biochemistry-problems/alpha_helix_h-bonds.py
  subject: biochemistry
  expected: topic04  # Protein Structure
  not: [topic06, topic02]  # not Thermodynamics, not Water and pH

