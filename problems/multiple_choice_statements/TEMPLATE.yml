---

#Which one of the following statements is FALSE/TRUE <connection word> <topic>
topic: the structure of DNA

#UNCOMMENT ONE OR BOTH FOR THIS TO WORK
override_question_true: ~
override_question_false: ~

replacement_rules:
    AAAAAAAA: '<span style="color: #d40000;">AAAAAAAA</span>' #RED
    BBBBBBBB: '<span style="color: #b74300;">BBBBBBBB</span>' #DARK ORANGE
    CCCCCCCC: '<span style="color: #935d00;">CCCCCCCC</span>' #LIGHT ORANGE
    DDDDDDDD: '<span style="color: #6c6c00;">DDDDDDDD</span>' #DARK YELLOW
    EEEEEEEE: '<span style="color: #3b7600;">EEEEEEEE</span>' #LIME GREEN
    FFFFFFFF: '<span style="color: #007a00;">FFFFFFFF</span>' #GREEN
    GGGGGGGG: '<span style="color: #00775f;">GGGGGGGG</span>' #TEAL
    HHHHHHHH: '<span style="color: #007576;">HHHHHHHH</span>' #CYAN
    IIIIIIII: '<span style="color: #076dad;">IIIIIIII</span>' #SKY BLUE
    JJJJJJJJ: '<span style="color: #003fff;">JJJJJJJJ</span>' #BLUE
    KKKKKKKK: '<span style="color: #0067cc;">KKKKKKKK</span>' #NAVY
    LLLLLLLL: '<span style="color: #a719db;">LLLLLLLL</span>' #PURPLE
    MMMMMMMM: '<span style="color: #c80085;">MMMMMMMM</span>' #MAGENTA
    NNNNNNNN: '<span style="color: #cc0066;">NNNNNNNN</span>' #PINK

connection_words: ~

true_statements:
  truth1a: the backbone contains only phosphate and sugar


false_statements:
  false1a: the backbone contains only phosphate and nucleobase
  false1b: the backbone contains only nucleobase and sugar


# conflicts, means that the statements cannot appear together
# add ': True' to each line, so the program runs a faster lookup
conflict_rules: ~



