    <br/>when the cytosine + guanine base pairing content decreases.
  truth2a: The melting temperature (T<sub>m</sub>) of a DNA strand goes up (increases)
    <br/>when the adenine + thymine base pairing content decreases.
  truth2b: The melting temperature (T<sub>m</sub>) of a DNA strand goes down (decreases)
    <br/>when the adenine + thymine base pairing content increases.
  truth10: The melting temperature (T<sub>m</sub>) of a DNA strand is the temperature
    <br/>at which half of strands are single-stranded and the other half are double-stranded.
